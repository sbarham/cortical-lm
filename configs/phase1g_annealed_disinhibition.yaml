# Phase 1g: full system + annealed disinhibitory window.
# Extends phase1f_hopfield: disinhibition on but linearly annealed to zero
# over the first 200M tokens (roughly 4 passes through TinyStories).
#
# Biological motivation: VIP->SST->PC disinhibition implements a critical-period
# plasticity window. Early in training the circuit acts as a context-dependent
# gain gate that accelerates credit assignment. As the feedforward weights mature
# the gate is withdrawn, preventing the overfit penalty seen in phase1e/1f.
#
# Annealing schedule: disinhibition_scale = max(0, 1 - tokens / anneal_tokens)
#   tokens=0         -> scale=1.0 (full disinhibition)
#   tokens=100M      -> scale=0.5
#   tokens=200M      -> scale=0.0 (disinhibition off for remaining 800M tokens)
#
# To change the window length override:
#   --override column.disinhibition_anneal_tokens=400000000

name: cortex-lm-phase1g-annealed-disinhibition
version: "0.1"

data:
  dataset: tinystories
  tokenizer: bpe
  vocab_size: 4096
  seq_len: 128

neuron:
  model: rate_adex
  nonlinearity: tanh
  tau_m_dist: lognormal
  tau_m_range: [2, 30]
  tau_w_dist: lognormal
  tau_w_range: [30, 500]
  adaptation_a: 0.1
  learn_taus: false

synapse:
  inter_column_stp: true
  tau_f_range: [50, 300]
  tau_d_range: [100, 800]
  U0_e: 0.2
  U0_i: 0.5

column:
  model: layered
  n_columns: 8
  disinhibition: true
  disinhibition_anneal_tokens: 200_000_000   # anneal VIP->SST gain 1->0 over first 200M tokens
  apical_pathway: additive
  layer_sizes:
    l4:  {n_e: 16, n_i: 4}
    l23: {n_e: 32, n_i: 8}
    l5:  {n_e: 16, n_i: 4}
    l6:  {n_e: 12, n_i: 3}

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sigma: 2.0

hippocampus:
  model: modern_hopfield
  n_memories: 64
  d_model: 64
  beta: 1.0
  ca1: false

readout:
  source: l5
  n_layers: 1
  hidden_dim: 128

embedding:
  dim: 32

learning:
  rule: bptt
  truncated_bptt_k: 32
  reset_state_between_batches: false

training:
  batch_size: 512
  max_tokens: 1_000_000_000
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 100
  eval_tokens: 1_638_400
  checkpoint_tokens: 32_768_000
  seed: 42

simulation:
  dt: 1.0

logging:
  wandb: false
  log_tokens: 1_638_400
  log_weight_stats: true
  log_tau_stats: true
  log_spike_rates: true
