# Phase 1d: full standard architecture minus hippocampus — adds AdEx neurons to phase1c.
# AdEx = Adaptive Exponential integrate-and-fire (rate-coded approximation):
#   adds a slow adaptation variable w per neuron, giving spike-frequency adaptation
#   and heterogeneous timescales (tau_w in [30, 500] ms vs tau_m in [2, 30] ms).
# Single variable change vs phase1c_stp: rate -> rate_adex neurons.

name: cortex-lm-phase1d-adex
version: "0.1"

data:
  dataset: tinystories
  tokenizer: bpe
  vocab_size: 4096
  seq_len: 128

neuron:
  model: rate_adex            # <-- change from rate
  nonlinearity: tanh
  tau_m_dist: lognormal
  tau_m_range: [2, 30]
  tau_w_dist: lognormal
  tau_w_range: [30, 500]
  adaptation_a: 0.1
  learn_taus: false

synapse:
  inter_column_stp: true
  tau_f_range: [50, 300]
  tau_d_range: [100, 800]
  U0_e: 0.2
  U0_i: 0.5

column:
  model: layered
  n_columns: 8
  disinhibition: false
  layer_sizes:
    l4:  {n_e: 16, n_i: 4}
    l23: {n_e: 32, n_i: 8}
    l5:  {n_e: 16, n_i: 4}
    l6:  {n_e: 12, n_i: 3}

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sigma: 2.0

hippocampus:
  model: none                 # Hopfield off — isolate AdEx effect

readout:
  source: l5
  n_layers: 1
  hidden_dim: 128

embedding:
  dim: 32

learning:
  rule: bptt
  truncated_bptt_k: 32
  reset_state_between_batches: false

training:
  batch_size: 512
  max_tokens: 524_288_000   # canonical Phase 1 budget; steps auto-scale with batch_size
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 100
  eval_interval: 200
  checkpoint_interval: 500
  seed: 42

simulation:
  dt: 1.0

logging:
  wandb: false
  log_interval: 100
  log_weight_stats: true
  log_tau_stats: true
  log_spike_rates: true
