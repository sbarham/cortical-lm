# Phase 1d: full standard architecture minus hippocampus — adds AdEx neurons to phase1c.
# AdEx = Adaptive Exponential integrate-and-fire (rate-coded approximation):
#   adds a slow adaptation variable w per neuron, giving spike-frequency adaptation
#   and heterogeneous timescales (tau_w in [30, 500] ms vs tau_m in [2, 30] ms).
# Single variable change vs phase1c_stp: rate -> rate_adex neurons.

name: cortex-lm-phase1d-adex
version: "0.1"

data:
  dataset: tinystories
  tokenizer: bpe
  vocab_size: 4096
  seq_len: 128

neuron:
  model: rate_adex            # <-- change from rate
  nonlinearity: tanh
  tau_m_dist: lognormal
  tau_m_range: [2, 30]
  tau_w_dist: lognormal
  tau_w_range: [30, 500]
  adaptation_a: 0.1
  learn_taus: false

synapse:
  inter_column_stp: true
  tau_f_range: [50, 300]
  tau_d_range: [100, 800]
  U0_e: 0.2
  U0_i: 0.5

column:
  model: layered
  n_columns: 16
  disinhibition: false
  layer_sizes:
    l4:  {n_e: 80,  n_i: 20}
    l23: {n_e: 160, n_i: 40}
    l5:  {n_e: 80,  n_i: 20}
    l6:  {n_e: 80,  n_i: 20}

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sigma: 3.0

hippocampus:
  model: none                 # Hopfield off — isolate AdEx effect

readout:
  source: l5
  n_layers: 2
  hidden_dim: 256

embedding:
  dim: 64

learning:
  rule: bptt
  truncated_bptt_k: 64
  reset_state_between_batches: false

training:
  batch_size: 128       # larger model; reduce to 64 if OOM
  max_steps: 20000      # ~330M tokens
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 200
  eval_interval: 400
  checkpoint_interval: 500
  seed: 42

simulation:
  dt: 1.0

logging:
  wandb: false
  log_interval: 100
  log_weight_stats: true
  log_tau_stats: true
  log_spike_rates: true
