name: cortex-lm-scale-1m-cortical
version: "0.1"

data:
  dataset: wikitext103
  tokenizer: bpe
  vocab_size: 16000
  seq_len: 256
  bpe_train_sample: 2000000
  tokenizer_path: tokenizers/wikitext103_bpe16k.pkl
  wikitext_token_limit: 100000000

neuron:
  model: rate_adex
  tau_m_range: [2, 30]
  tau_w_range: [30, 500]

column:
  model: layered
  n_columns: 16
  apical_pathway: additive
  layer_sizes:
    l4:  {n_e: 40,  n_i: 10}
    l23: {n_e: 80,  n_i: 20}
    l5:  {n_e: 40,  n_i: 10}
    l6:  {n_e: 30,  n_i: 7}

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sparse_threshold: 0.05
  seed: 42

synapse:
  inter_column_stp: false

hippocampus:
  model: modern_hopfield
  n_memories: 256
  d_model: 128
  beta: 1.0
  ca1: false
  normalize_xi: false

embedding:
  dim: 64

thalamus:
  enabled: true
  embed_dim_large: 64
  col_input_dim: 32
  trn_competition: false

readout:
  source: l5
  n_layers: 2
  hidden_dim: 256
  weight_tying: true

learning:
  rule: bptt
  reset_state_between_batches: false

training:
  batch_size: 64
  max_tokens: 1000000000
  lr: 3e-4
  weight_decay: 1e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 2000
  log_tokens: 1000000
  eval_tokens: 5000000
  checkpoint_tokens: 10000000
  bf16: true
  grad_accum_steps: 1
  compile: false

logging:
  wandb: false
  project: cortex-lm
  group: scale-v2
