# Phase 1e exploratory: Hopfield + corticortical apical pathway (variant D).
# Single variable change vs phase1e_hopfield: apical_pathway = corticortical.
# L5E of column (k+1) feeds back to L23E of column k — circular top-down signal.
# Exploratory run: batch=1024, 4000 steps (~2.5h).

name: cortex-lm-phase1e-hopfield-apical-d
version: "0.1"

data:
  dataset: tinystories
  tokenizer: bpe
  vocab_size: 4096
  seq_len: 128

neuron:
  model: rate_adex
  nonlinearity: tanh
  tau_m_dist: lognormal
  tau_m_range: [2, 30]
  tau_w_dist: lognormal
  tau_w_range: [30, 500]
  adaptation_a: 0.1
  learn_taus: false

synapse:
  inter_column_stp: true
  tau_f_range: [50, 300]
  tau_d_range: [100, 800]
  U0_e: 0.2
  U0_i: 0.5

column:
  model: layered
  n_columns: 8
  disinhibition: false
  apical_pathway: corticortical
  layer_sizes:
    l4:  {n_e: 16, n_i: 4}
    l23: {n_e: 32, n_i: 8}
    l5:  {n_e: 16, n_i: 4}
    l6:  {n_e: 12, n_i: 3}

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sigma: 2.0

hippocampus:
  model: modern_hopfield
  n_memories: 64
  d_model: 64
  beta: 1.0
  ca1: false

readout:
  source: l5
  n_layers: 1
  hidden_dim: 128

embedding:
  dim: 32

learning:
  rule: bptt
  truncated_bptt_k: 32
  reset_state_between_batches: false

training:
  batch_size: 1024
  max_tokens: 524_288_000
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 100
  eval_tokens: 13_107_200
  checkpoint_tokens: 32_768_000
  seed: 42

simulation:
  dt: 1.0

logging:
  wandb: false
  log_tokens: 6_553_600
  log_weight_stats: true
  log_tau_stats: true
  log_spike_rates: true
