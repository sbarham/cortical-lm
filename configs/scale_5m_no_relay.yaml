# Cortical-matched ablation of scale_5m_cortical — no thalamic relay.
# Ablation question: does per-column differentiated thalamic input help,
# given identical cortical capacity?
#
# Differences from scale_5m_cortical:
#   - thalamus.enabled: false  (relay removed; legacy broadcast path)
#   - embedding.dim: 64        (= col_input_dim; all columns see the same
#                                uniform embedding broadcast)
#
# Cortical params are identical (~4.71M). Total params are smaller (~6.02M vs
# ~10.0M) because the embedding matrix is 4x narrower and there is no relay.
# This difference is intentional — it is part of what is being tested.
#
# NOTE: embed_dim=64 is richer than any prior cortex-lm model (TinyStories
# models used embed_dim=32). If this variant performs well, the gain cannot be
# attributed solely to column architecture — the broader broadcast embedding
# is also a contributing factor. Interpret accordingly.
name: cortex-lm-scale-5m-no-relay
version: "0.1"

data:
  dataset: wikitext103
  tokenizer: bpe
  vocab_size: 16000
  seq_len: 256
  bpe_train_sample: 2000000
  tokenizer_path: tokenizers/wikitext103_bpe16k.pkl
  wikitext_token_limit: 100000000

neuron:
  model: rate_adex
  tau_m_range: [2, 30]
  tau_w_range: [30, 500]

column:
  model: layered
  n_columns: 32
  apical_pathway: additive
  layer_sizes:
    l4:  {n_e: 52,  n_i: 13}
    l23: {n_e: 104, n_i: 26}
    l5:  {n_e: 52,  n_i: 13}
    l6:  {n_e: 40,  n_i: 10}

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sparse_threshold: 0.05
  seed: 42

synapse:
  inter_column_stp: false

hippocampus:
  model: modern_hopfield
  n_memories: 1024
  d_model: 256
  beta: 1.0
  ca1: false
  normalize_xi: false

embedding:
  dim: 64

thalamus:
  enabled: false

readout:
  source: l5
  n_layers: 2
  hidden_dim: 512
  weight_tying: true

learning:
  rule: bptt
  reset_state_between_batches: false

training:
  batch_size: 64
  max_tokens: 1000000000
  lr: 3e-4
  weight_decay: 1e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 2000
  log_tokens: 1000000
  eval_tokens: 5000000
  checkpoint_tokens: 10000000
  bf16: true
  grad_accum_steps: 2
  compile: false

logging:
  wandb: false
  project: cortex-lm
  group: scale-v2
