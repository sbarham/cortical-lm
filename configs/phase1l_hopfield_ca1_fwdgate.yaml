# Phase 1l: Hopfield CA3 + CA1 with forward-gated error feedback.
# Single variable change vs phase1k_hopfield_ca1_v2: forward_gate_ca1 on.
#
# In 1k the write gate is gradient-only: the cortex always receives the full
# CA1 error signal regardless of surprise level.  This tests whether the gate
# should *also* modulate the forward-pass magnitude of that signal.
#
# With forward_gate_ca1: true, ca1_mod is scaled by write_gate before being
# added to thal_inc.  Effect:
#   - high surprise (novel input)  -> write_gate~1 -> strong CA1 error feedback
#   - low surprise (familiar input) -> write_gate~0 -> weak CA1 error feedback
#
# Biological interpretation: CA1 fires strongly during novelty (sharp-wave
# ripple initiation) and is suppressed during familiar pattern replay.
# This is the most biologically faithful variant but adds a nonlinearity to
# the cortical modulation path that could also help or hurt learning.
#
# No apical pathway -- kept for the apical ablation series.

name: cortex-lm-phase1l-hopfield-ca1-fwdgate
version: "0.1"

data:
  dataset: tinystories
  tokenizer: bpe
  vocab_size: 4096
  seq_len: 128

neuron:
  model: rate_adex
  nonlinearity: tanh
  tau_m_dist: lognormal
  tau_m_range: [2, 30]
  tau_w_dist: lognormal
  tau_w_range: [30, 500]
  adaptation_a: 0.1
  learn_taus: false

synapse:
  inter_column_stp: true
  tau_f_range: [50, 300]
  tau_d_range: [100, 800]
  U0_e: 0.2
  U0_i: 0.5

column:
  model: layered
  n_columns: 8
  disinhibition: false
  layer_sizes:
    l4:  {n_e: 16, n_i: 4}
    l23: {n_e: 32, n_i: 8}
    l5:  {n_e: 16, n_i: 4}
    l6:  {n_e: 12, n_i: 3}

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sigma: 2.0

hippocampus:
  model: modern_hopfield
  n_memories: 64
  d_model: 64
  beta: 1.0
  ca1: true                       # CA1 prediction-error write-gating ON
  normalize_xi: true              # Xi rows normalized to unit sphere after each step
  gated_error_vec: true           # error_vec uses gated_retrieved (fixes gradient leak)
  forward_gate_ca1: true          # ca1_mod scaled by write_gate in forward pass

readout:
  source: l5
  n_layers: 1
  hidden_dim: 128

embedding:
  dim: 32

learning:
  rule: bptt
  truncated_bptt_k: 32
  reset_state_between_batches: false

training:
  batch_size: 512
  max_tokens: 1_000_000_000
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 100
  eval_tokens: 1_638_400
  checkpoint_tokens: 32_768_000
  seed: 42

simulation:
  dt: 1.0

logging:
  wandb: false
  log_tokens: 1_638_400
  log_weight_stats: true
  log_tau_stats: true
  log_spike_rates: true
