# Phase 1i: Hopfield + CA1 entorhinal prediction-error pathway.
# Single variable change vs phase1f_hopfield: ca1 on.
#
# Biological motivation: CA1 sits at the junction of two streams:
#   - CA3 -> CA1 (Schaffer collaterals): pattern-completed retrieved memory
#   - EC layer III -> CA1 (temporoammonic path): actual current input
#
# CA1 computes the mismatch.  Primary function: gates Xi writes.
#   high surprise -> write_gate~1 -> Xi gradients flow -> memory updated
#   low surprise  -> write_gate~0 -> Xi gradients suppressed -> memory protected
# Secondary function: directional error vector fed back to cortex as modulation.
#
# No disinhibition -- disinhibition and Hopfield interfere; CA1 is tested
# against the clean 1f base to isolate its contribution.
# No apical pathway -- kept for the dedicated apical ablation series.

name: cortex-lm-phase1i-hopfield-ca1
version: "0.1"

data:
  dataset: tinystories
  tokenizer: bpe
  tokenizer_path: tokenizers/tinystories_bpe4096.pkl
  vocab_size: 4096
  seq_len: 128

neuron:
  model: rate_adex
  nonlinearity: tanh
  tau_m_dist: lognormal
  tau_m_range: [2, 30]
  tau_w_dist: lognormal
  tau_w_range: [30, 500]
  adaptation_a: 0.1
  learn_taus: false

synapse:
  inter_column_stp: true
  tau_f_range: [50, 300]
  tau_d_range: [100, 800]
  U0_e: 0.2
  U0_i: 0.5

column:
  model: layered
  n_columns: 8
  disinhibition: false            # VIP circuit OFF -- isolates CA1 contribution vs 1f
  layer_sizes:
    l4:  {n_e: 16, n_i: 4}
    l23: {n_e: 32, n_i: 8}
    l5:  {n_e: 16, n_i: 4}
    l6:  {n_e: 12, n_i: 3}

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sigma: 2.0

hippocampus:
  model: modern_hopfield
  n_memories: 64
  d_model: 64
  beta: 1.0
  ca1: true                       # CA1 prediction-error write-gating ON

readout:
  source: l5
  n_layers: 1
  hidden_dim: 128

embedding:
  dim: 32

learning:
  rule: bptt
  truncated_bptt_k: 32
  reset_state_between_batches: false

training:
  batch_size: 512
  max_tokens: 1_000_000_000
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 100
  eval_tokens: 1_638_400
  checkpoint_tokens: 32_768_000
  seed: 42

simulation:
  dt: 1.0

logging:
  wandb: false
  log_tokens: 1_638_400
  log_weight_stats: true
  log_tau_stats: true
  log_spike_rates: true
