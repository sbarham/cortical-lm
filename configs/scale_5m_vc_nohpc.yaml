# scale_5m_vc_nohpc: identical to scale_5m_run5_combined (the "vc" architecture) but
# with hippocampus disabled.  Used to isolate the HPC contribution at 5M-param scale.
#
# Run via (DAWN schedule, WikiText-103):
#   python scripts/train.py --config configs/scale_5m_vc_nohpc.yaml \
#     --override learning.rule=eprop_hybrid learning.eprop_mode=vectorized \
#       learning.hybrid_eprop_steps=20 learning.hybrid_bptt_steps=10 \
#       learning.hybrid_bptt_batch_size=128 learning.hybrid_bptt_scope=full \
#       learning.reset_state_between_batches=true \
#       learning.sgdr_restart_tokens=12500000 \
#       learning.hybrid_eprop_steps_schedule=[20,10,5,2,0] \
#       learning.hybrid_bptt_steps_schedule=[10,20,25,28,30] \
#       training.batch_size=16 training.max_tokens=100000000 \
#       name=scale5m-vc-nohpc-wiki103 \
#       logging.wandb=true logging.project=cortex-lm logging.group=scale5m-ablation
name: scale5m-vc-nohpc-wiki103
version: "0.1"

data:
  dataset: wikitext103
  tokenizer: bpe
  vocab_size: 16000
  seq_len: 256
  bpe_train_sample: 2000000
  tokenizer_path: tokenizers/wikitext103_bpe16k.pkl
  wikitext_token_limit: 100000000

neuron:
  model: rate_adex
  tau_m_range: [2, 30]
  tau_w_range: [30, 500]

column:
  model: layered
  n_columns: 32
  apical_pathway: additive
  l6_thalamic_shortcut: true
  layer_sizes:
    l4:  {n_e: 52,  n_i: 13}
    l23: {n_e: 104, n_i: 26}
    l5:  {n_e: 52,  n_i: 13}
    l6:  {n_e: 40,  n_i: 10}

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sparse_threshold: 0.05
  seed: 42

synapse:
  inter_column_stp: false

hippocampus:
  model: none                  # HPC removed — isolates cortical contribution

embedding:
  dim: 256

thalamus:
  enabled: true
  embed_dim_large: 256
  col_input_dim: 64
  trn_competition: false

readout:
  source: l5
  n_layers: 2
  hidden_dim: 512
  weight_tying: true

learning:
  rule: bptt
  reset_state_between_batches: false

training:
  batch_size: 512
  max_tokens: 100000000
  lr: 3e-4
  weight_decay: 1e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 76
  log_tokens: 100000
  eval_tokens: 500000
  checkpoint_tokens: 10000000
  bf16: true
  grad_accum_steps: 1
  compile: false

logging:
  wandb: false
  project: cortex-lm
  group: scale5m-ablation
