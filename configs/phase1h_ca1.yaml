# Phase 1h: full system + CA1 entorhinal->CA1 prediction-error signal.
# Single variable change vs phase1g: hippocampus.ca1: true.
#
# Biological motivation
# ---------------------
# In the real hippocampus, CA3 provides pattern completion (retrieved memory)
# but the cortex does not receive the raw CA3 output. Instead CA1 sits at the
# junction of two streams:
#   - CA3 -> CA1 (Schaffer collaterals): the pattern-completed RETRIEVED memory
#   - Entorhinal cortex layer III -> CA1 (temporoammonic path): the actual CURRENT input
#
# CA1 computes the MISMATCH between these two and feeds THAT back to the cortex
# via entorhinal layer V. High surprise = strong error signal; low surprise (familiar
# input) = weak signal, saving the modulation channel for genuinely novel patterns.
#
# Implementation
# --------------
# ca1_proj     : cortical_state -> d_model  (the EC observation stream)
# ca1_out_proj : error_vector   -> per-column modulation  (CA1 -> cortex)
# error_vector = retrieved (CA3 output) - ca1_proj(current cortical state)
#
# The cortex receives: CA3 modulation ("here is the remembered context") +
#                      CA1 error ("here is how reality departs from the memory")
#
# Prediction: CA1 should primarily improve performance in the late-training regime
# (> 400M tokens) where most inputs are repetitions -- CA1 stops wasting memory
# capacity on patterns the network already predicts correctly.

name: cortex-lm-phase1h-ca1
version: "0.1"

data:
  dataset: tinystories
  tokenizer: bpe
  vocab_size: 4096
  seq_len: 128

neuron:
  model: rate_adex
  nonlinearity: tanh
  tau_m_dist: lognormal
  tau_m_range: [2, 30]
  tau_w_dist: lognormal
  tau_w_range: [30, 500]
  adaptation_a: 0.1
  learn_taus: false

synapse:
  inter_column_stp: true
  tau_f_range: [50, 300]
  tau_d_range: [100, 800]
  U0_e: 0.2
  U0_i: 0.5

column:
  model: layered
  n_columns: 8
  disinhibition: true
  disinhibition_anneal_tokens: 200_000_000
  apical_pathway: additive
  layer_sizes:
    l4:  {n_e: 16, n_i: 4}
    l23: {n_e: 32, n_i: 8}
    l5:  {n_e: 16, n_i: 4}
    l6:  {n_e: 12, n_i: 3}

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sigma: 2.0

hippocampus:
  model: modern_hopfield
  n_memories: 64
  d_model: 64
  beta: 1.0
  ca1: true                 # adds entorhinal->CA1 prediction-error pathway

readout:
  source: l5
  n_layers: 1
  hidden_dim: 128

embedding:
  dim: 32

learning:
  rule: bptt
  truncated_bptt_k: 32
  reset_state_between_batches: false

training:
  batch_size: 512
  max_tokens: 1_000_000_000
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 100
  eval_tokens: 1_638_400
  checkpoint_tokens: 32_768_000
  seed: 42

simulation:
  dt: 1.0

logging:
  wandb: false
  log_tokens: 1_638_400
  log_weight_stats: true
  log_tau_stats: true
  log_spike_rates: true
