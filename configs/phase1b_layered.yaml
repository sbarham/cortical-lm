# Phase 1b: layered cortical columns ‚Äî same as minimal but with 4-layer column structure
# (L4, L2/3, L5, L6) instead of flat simple_ei.
# Layer sizes chosen so L5 output (readout source) is 16E x 8 cols = 128-dim,
# comparable to phase1a's 20E x 8 cols = 160-dim. Avoids the severe bottleneck
# of the original 8E-per-layer design.
# Single variable change: column topology only.
# Compare val perplexity vs minimal to assess value of laminar structure.

name: cortex-lm-phase1b-layered
version: "0.1"

data:
  dataset: tinystories
  tokenizer: bpe
  vocab_size: 4096
  seq_len: 128

neuron:
  model: rate
  nonlinearity: tanh
  tau_m_dist: lognormal
  tau_m_range: [2, 30]
  learn_taus: false

synapse:
  inter_column_stp: false   # STP off ‚Äî isolate column structure effect

column:
  model: layered
  n_columns: 8
  disinhibition: false
  layer_sizes:
    l4:  {n_e: 16, n_i: 4}    # thalamic input layer ‚Äî 16 fits 32-dim embedding without crushing
    l23: {n_e: 32, n_i: 8}    # largest ‚Äî association / recurrent
    l5:  {n_e: 16, n_i: 4}    # output layer (readout source): 16 x 8 cols = 128-dim
    l6:  {n_e: 12, n_i: 3}    # feedback to thalamus

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sigma: 2.0

hippocampus:
  model: none

readout:
  source: l5
  n_layers: 1
  hidden_dim: 128

embedding:
  dim: 32

learning:
  rule: bptt
  truncated_bptt_k: 32    # full BPTT (k=null) causes vanishing gradients through 4 layers

training:
  batch_size: 512
  max_tokens: 1_000_000_000   # canonical Phase 1 budget; steps auto-scale with batch_size
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 100
  eval_tokens: 1_638_400    # every 200 steps @ batch=512 ó auto-scales with batch_size
  checkpoint_tokens: 32_768_000  # every 500 steps @ batch=512 ó auto-scales with batch_size
  seed: 42

simulation:
  dt: 1.0

logging:
  wandb: false
  log_tokens: 1_638_400      # every 100 steps @ batch=512 ó auto-scales with batch_size
