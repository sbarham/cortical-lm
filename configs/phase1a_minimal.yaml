# Phase 1: minimal baseline — rate-coded neurons, simple E/I column, BPTT, no hippocampus.
# Purpose: validate that the architecture can learn NTP before adding complexity.

name: cortex-lm-minimal
version: "0.1"

data:
  dataset: tinystories
  tokenizer: bpe
  vocab_size: 4096
  seq_len: 128

neuron:
  model: rate
  nonlinearity: tanh
  tau_m_dist: lognormal
  tau_m_range: [2, 30]
  learn_taus: false

synapse:
  inter_column_stp: false

column:
  model: simple_ei
  n_columns: 8
  n_e: 40
  n_i: 10

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sigma: 2.0

hippocampus:
  model: none

readout:
  source: e_out
  n_layers: 1
  hidden_dim: 128

embedding:
  dim: 32

learning:
  rule: bptt
  truncated_bptt_k: null

training:
  batch_size: 512       # RTX 5060 Ti 8GB — ~500M tokens over 8k steps
  max_steps: 8000
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 100
  eval_interval: 200
  checkpoint_interval: 500
  seed: 42

simulation:
  dt: 1.0

logging:
  wandb: false
  log_interval: 100
