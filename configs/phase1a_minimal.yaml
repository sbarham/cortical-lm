# Phase 1: minimal baseline " rate-coded neurons, simple E/I column, BPTT, no hippocampus.
# Purpose: validate that the architecture can learn NTP before adding complexity.

name: cortex-lm-minimal
version: "0.1"

data:
  dataset: tinystories
  tokenizer: bpe
  tokenizer_path: tokenizers/tinystories_bpe4096.pkl
  vocab_size: 4096
  seq_len: 128

neuron:
  model: rate
  nonlinearity: tanh
  tau_m_dist: lognormal
  tau_m_range: [2, 30]
  learn_taus: false

synapse:
  inter_column_stp: false

column:
  model: simple_ei
  n_columns: 8
  n_e: 40
  n_i: 10

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sigma: 2.0

hippocampus:
  model: none

readout:
  source: e_out
  n_layers: 1
  hidden_dim: 128

embedding:
  dim: 32

learning:
  rule: bptt
  truncated_bptt_k: null

training:
  batch_size: 512
  max_tokens: 1_000_000_000   # 512 * 128 * 8000 " canonical Phase 1 budget; steps auto-scale with batch_size
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 100
  eval_tokens: 1_638_400    # every 200 steps @ batch=512 -- auto-scales with batch_size
  checkpoint_tokens: 32_768_000  # every 500 steps @ batch=512 -- auto-scales with batch_size
  seed: 42

simulation:
  dt: 1.0

logging:
  wandb: false
  log_tokens: 1_638_400      # every 100 steps @ batch=512 -- auto-scales with batch_size
