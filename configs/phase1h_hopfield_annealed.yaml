# Phase 1h: Hopfield + annealed disinhibitory window.
# Single variable change vs phase1g_hopfield_disinhibition: disinhibition decays
# linearly from 1->0 over the first 200M tokens, then stays off.
#
# Biological motivation: models the closure of a critical-period plasticity window.
# Early high-plasticity window accelerates credit assignment; withdrawal of VIP->SST
# gain as the cortex matures mirrors ocular dominance critical period closure.
#
# Prediction: best of both worlds -- fast early convergence (disinhibition helping
# before Hopfield has learned useful memories) + clean late-training generalisation
# (no VIP noise once Hopfield is mature).
#
# Annealing schedule: disinhibition_scale = max(0, 1 - tokens / 200M)
#   tokens=0    -> scale=1.0 (full disinhibition)
#   tokens=100M -> scale=0.5
#   tokens=200M -> scale=0.0 (off for remaining 800M tokens)
#
# No apical pathway -- kept for the dedicated apical ablation series.

name: cortex-lm-phase1h-hopfield-annealed
version: "0.1"

data:
  dataset: tinystories
  tokenizer: bpe
  tokenizer_path: tokenizers/tinystories_bpe4096.pkl
  vocab_size: 4096
  seq_len: 128

neuron:
  model: rate_adex
  nonlinearity: tanh
  tau_m_dist: lognormal
  tau_m_range: [2, 30]
  tau_w_dist: lognormal
  tau_w_range: [30, 500]
  adaptation_a: 0.1
  learn_taus: false

synapse:
  inter_column_stp: true
  tau_f_range: [50, 300]
  tau_d_range: [100, 800]
  U0_e: 0.2
  U0_i: 0.5

column:
  model: layered
  n_columns: 8
  disinhibition: true
  disinhibition_anneal_tokens: 200_000_000   # anneal VIP->SST gain 1->0 over first 200M tokens
  layer_sizes:
    l4:  {n_e: 16, n_i: 4}
    l23: {n_e: 32, n_i: 8}
    l5:  {n_e: 16, n_i: 4}
    l6:  {n_e: 12, n_i: 3}

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sigma: 2.0

hippocampus:
  model: modern_hopfield
  n_memories: 64
  d_model: 64
  beta: 1.0
  ca1: false

readout:
  source: l5
  n_layers: 1
  hidden_dim: 128

embedding:
  dim: 32

learning:
  rule: bptt
  truncated_bptt_k: 32
  reset_state_between_batches: false

training:
  batch_size: 512
  max_tokens: 1_000_000_000
  lr: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 100
  eval_tokens: 1_638_400
  checkpoint_tokens: 32_768_000
  seed: 42

simulation:
  dt: 1.0

logging:
  wandb: false
  log_tokens: 1_638_400
  log_weight_stats: true
  log_tau_stats: true
  log_spike_rates: true
