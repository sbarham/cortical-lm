# Cortical-matched ablation of scale_4m_cortical — no thalamic relay.
# Ablation question: does per-column differentiated thalamic input help,
# given identical cortical capacity?
#
# Differences from scale_4m_cortical:
#   - thalamus.enabled: false  (relay removed; legacy broadcast path)
#   - embedding.dim: 32        (= col_input_dim; all columns see the same
#                                narrow embedding broadcast uniformly)
#
# Cortical params are identical (~2.44M). Total params are smaller (~2.97M vs
# ~5.4M) because the embedding matrix is 4x narrower and there is no relay.
# This difference is intentional — it is part of what is being tested.
name: cortex-lm-scale-4m-no-relay
version: "0.1"

data:
  dataset: wikitext103
  tokenizer: bpe
  vocab_size: 16000
  seq_len: 256
  bpe_train_sample: 2000000
  tokenizer_path: tokenizers/wikitext103_bpe16k.pkl
  wikitext_token_limit: 100000000

neuron:
  model: rate_adex
  tau_m_range: [2, 30]
  tau_w_range: [30, 500]

column:
  model: layered
  n_columns: 24
  apical_pathway: additive
  layer_sizes:
    l4:  {n_e: 48,  n_i: 12}
    l23: {n_e: 96,  n_i: 24}
    l5:  {n_e: 48,  n_i: 12}
    l6:  {n_e: 36,  n_i: 9}

connectivity:
  type: gaussian_1d
  p_max: 0.7
  sparse_threshold: 0.05
  seed: 42

synapse:
  inter_column_stp: false

hippocampus:
  model: modern_hopfield
  n_memories: 512
  d_model: 256
  beta: 1.0
  ca1: false
  normalize_xi: false

embedding:
  dim: 32

thalamus:
  enabled: false

readout:
  source: l5
  n_layers: 2
  hidden_dim: 512
  weight_tying: true

learning:
  rule: bptt
  reset_state_between_batches: false

training:
  batch_size: 64
  max_tokens: 1000000000
  lr: 3e-4
  weight_decay: 1e-4
  grad_clip: 1.0
  optimizer: adamw
  scheduler: cosine
  warmup_steps: 2000
  log_tokens: 1000000
  eval_tokens: 5000000
  checkpoint_tokens: 10000000
  bf16: true
  grad_accum_steps: 1
  compile: false

logging:
  wandb: false
  project: cortex-lm
  group: scale-v2
